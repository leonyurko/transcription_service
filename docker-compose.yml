version: "3.9"

services:
  transcribe:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - whisper_cache:/root/.cache/huggingface
    restart: unless-stopped

  # Uncomment for GPU support (requires nvidia-docker)
